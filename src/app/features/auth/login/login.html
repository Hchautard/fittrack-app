<div class="flex w-screen h-screen font-display flex-col items-center justify-center">
  <div class="form-layout">
    <div class="heading-layout">
      <h1 class="heading-title leading">Sign in here</h1>
    </div>
    <form class="form-layout" #loginForm="ngForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email" class="form-label">Email</label>
        <input
          type="email"
          id="email"
          class="form-input"
          placeholder="Enter your email"
          name="email"
          [(ngModel)]="email"
        />
      </div>
      <div class="form-group">
        <label for="password" class="form-label">Password</label>
        <input
          type="password"
          id="password"
          class="form-input"
          placeholder="Enter your password"
          name="password"
          [(ngModel)]="password"
        />
      <span class="subtitle">
        If you don’t have an account register :
        <span class="font-bold text-blue-800">Register here !</span>
      </span>
    </div>
    <button class="form-button">Sign in</button>
    </form>
  </div>
</div>
